name: frontend-build

on:
  push:
    paths:
     - 'frontend/**'
     - '.github/workflows/frontend-build.yml'
    branches: [ "mainline" ]
  pull_request:
    paths:
     - 'frontend/**'
     - '.github/workflows/frontend-build.yml'
    branches: [ "mainline" ]

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Build application
        working-directory: frontend
        run: npm run build
