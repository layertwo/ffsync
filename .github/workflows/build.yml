name: build

on:
  workflow_call:

jobs:
  smithy:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 17
          cache: gradle

      - name: Build Smithy model
        working-directory: smithy
        run: ./gradlew smithyBuild

      - uses: actions/upload-artifact@v7
        with:
          name: smithy-output
          path: build/smithy
          retention-days: 1

  frontend:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm test && npm run build

      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  synth:
    needs: [smithy, frontend]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: docker/setup-buildx-action@v4
        with:
          use: true
          driver-opts: default-load=true

      # setup-buildx-action v4 dropped the `install: true` input; run the
      # equivalent ourselves so CDK's `docker build` is aliased to
      # `docker buildx build` and routes through the buildx instance above
      # (needed for --cache-to type=gha).
      - name: Alias docker build to buildx
        run: docker buildx install

      - uses: crazy-max/ghaction-github-runtime@v4

      - name: Install dependencies
        run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: smithy-output
          path: build/smithy

      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build TypeScript
        run: npm run build

      - name: CDK synth
        run: npx cdk synth --all --output build/cdk.out

      - uses: actions/upload-artifact@v7
        with:
          name: cdk-out
          path: build/cdk.out
          retention-days: 1
