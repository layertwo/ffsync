name: deploy

on:
  push:
    branches: [mainline]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: "us-west-2"
  STAGE: "prod"

jobs:
  build:
    permissions:
      contents: read
    uses: ./.github/workflows/build.yml

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: cdk-out
          path: build/cdk.out

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.CDK_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy stacks
        run: npx cdk deploy *-${{ env.STAGE }} GitHubOidcStack --app build/cdk.out --require-approval never
