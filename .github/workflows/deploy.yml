name: deploy

on:
  push:
    branches: [mainline]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: "us-west-2"
  STAGE: "prod"

jobs:
  smithy:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 17
          cache: gradle

      - name: Build Smithy model
        working-directory: smithy
        run: ./gradlew smithyBuild

      - uses: actions/upload-artifact@v7
        with:
          name: smithy-output
          path: build/smithy
          retention-days: 1

  frontend:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  synth:
    needs: [smithy, frontend]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: smithy-output
          path: build/smithy

      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build TypeScript
        run: npm run build

      - name: CDK synth
        run: npx cdk synth --all --output build/cdk.out

      - uses: actions/upload-artifact@v7
        with:
          name: cdk-out
          path: build/cdk.out
          retention-days: 1

  deploy:
    needs: synth
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: cdk-out
          path: build/cdk.out

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.CDK_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy stacks
        run: npx cdk deploy *-${{ env.STAGE }} --app build/cdk.out --require-approval never
