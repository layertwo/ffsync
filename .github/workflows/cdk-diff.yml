name: cdk-diff

on:
  pull_request:
    branches: [mainline]
    paths:
      - 'lib/**'
      - 'lambda/**'
      - 'smithy/**'
      - '.github/workflows/build.yml'
      - '.github/workflows/cdk-diff.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'cdk.json'
      - 'cdk.context.json'

permissions:
  contents: read

concurrency:
  group: cdk-diff-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  AWS_REGION: "us-west-2"
  STAGE: "prod"

jobs:
  build:
    uses: ./.github/workflows/build.yml

  diff:
    needs: build
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: cdk-out
          path: build/cdk.out

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.CDK_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK Diff
        uses: corymhall/cdk-diff-action@v2
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          failOnDestructiveChanges: false
          cdkOutDir: build/cdk.out
